{% extends "base.html" %}
{% block title %}Contacts{% endblock %}
{% block content %}
<h3>Saved Contacts</h3>
<table class="table table-bordered">
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
    </tr>
    {% for c in contacts %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.email }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
