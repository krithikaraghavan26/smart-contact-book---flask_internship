<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Contact Book{% endblock %}</title>
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
    <link 
        rel="stylesheet" 
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="{{ url_for('home') }}">ContactBook</a>
    <div class="navbar-nav ms-auto">
        <a class="nav-link" href="{{ url_for('add_contact') }}">Add Contact</a>
        <a class="nav-link" href="{{ url_for('view_contacts') }}">View Contacts</a>
        <a class="nav-link" href="{{ url_for('feedback') }}">Feedback</a>
    </div>
</nav>
<div class="container mt-4">
    {% for msg in get_flashed_messages() %}
        <div class="alert alert-info">{{ msg }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
